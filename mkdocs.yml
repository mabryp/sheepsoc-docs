site_name: sheepsoc
site_description: Sheepsoc operations hub — architecture, SOPs, configuration, and operational guides
site_url: http://192.168.50.100/
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Infrastructure:
    - Overview: infrastructure/index.md
    - Topology: infrastructure/topology.md
    - Services: infrastructure/services.md
    - Platforms:
      - OpenWebUI & RAG: infrastructure/platforms/openwebui-rag.md
      - Elasticsearch & ELSER: infrastructure/platforms/elasticsearch-elser.md
      - Knowledge Bases: infrastructure/platforms/knowledge-bases.md
      - Matrix Bot: infrastructure/platforms/matrix-bot.md
      - Conda: infrastructure/platforms/conda.md
    - Runbooks:
      - Shutdown & Startup: infrastructure/runbooks/shutdown-startup.md
      - OpenWebUI KB Bulk Ingest: infrastructure/runbooks/openwebui-kb-bulk-ingest.md
      - Nightly Backups: infrastructure/runbooks/nightly-backups.md
    - Backup & Recovery:
      - Config Backup & Encryption: infrastructure/backup-and-recovery/config-backup.md
      - GitHub & RAG Sync: infrastructure/backup-and-recovery/github-rag-sync.md
    - Known Issues: infrastructure/known-issues.md
    - Future Improvements: infrastructure/future-improvements.md
  - Research:
    - Overview: research/index.md
    - Research Agenda: research/agenda.md
    - RAG-001:
      - Protocol: research/rag-001/protocol.md
      - Precision Audit: research/rag-001/precision-audit.md
  - Lab Operations:
    - Overview: lab-operations/index.md
    - Standard Procedures: lab-operations/sops.md
    - Docs Workflow: lab-operations/docs-workflow.md
    - Agent Guide: lab-operations/agent-guide.md
    - The Agile Team: lab-operations/agile-team.md
